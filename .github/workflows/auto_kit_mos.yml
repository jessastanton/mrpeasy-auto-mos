name: Auto-Create Kit Manufacturing Orders

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  create-kit-mos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run MO creation script
        env:
          MRPEASY_API_KEY: ${{ secrets.MRPEASY_API_KEY }}
          MRPEASY_API_SECRET: ${{ secrets.MRPEASY_API_SECRET }}
        run: python create_kit_mos.py
